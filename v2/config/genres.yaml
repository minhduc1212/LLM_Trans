# ============================================================
# GENRE STYLES - Style hint injected into each prompt
# Keep SHORT (< 30 tokens each) for Gemma4 efficiency
# ============================================================

genres:
  default:
    label: "Mặc định"
    hint: "Dịch sát nghĩa, đúng ngữ cảnh, dễ hiểu, giữ văn phong tác giả, đúng cấu trúc ngữ pháp tiếng Việt. Không thêm thắt."
    term_categories: []

  scifi:
    label: "Khoa học viễn tưởng"
    hint: "Ưu tiên thuật ngữ kỹ thuật chính xác. Văn phong lạnh, khoa học, súc tích."
    term_categories: ["công nghệ", "sinh học", "vũ trụ", "AI", "vật lý"]

  fantasy:
    label: "Fantasy / Huyền ảo"
    hint: "Giữ sắc thái huyền bí, cổ điển. Thuật ngữ phép thuật, sinh vật, thế giới quan."
    term_categories: ["phép thuật", "sinh vật", "địa danh", "danh hiệu"]

  romance:
    label: "Lãng mạn"
    hint: "Văn phong mượt mà, cảm xúc, tinh tế. Chú ý sắc thái tình cảm."
    term_categories: ["cảm xúc", "mối quan hệ", "địa điểm lãng mạn"]

  thriller:
    label: "Thriller / Hồi hộp"
    hint: "Nhịp nhanh, căng thẳng, súc tích. Câu ngắn. Không dài dòng."
    term_categories: ["vũ khí", "tổ chức", "địa điểm", "thủ thuật"]

  historical:
    label: "Lịch sử"
    hint: "Văn phong trang trọng, cổ điển. Thuật ngữ thời đại phù hợp. Danh xưng lịch sử."
    term_categories: ["chức quan", "địa danh cổ", "phong tục", "vũ khí cổ"]

  horror:
    label: "Kinh dị"
    hint: "Bầu không khí u ám, rùng rợn. Dùng từ gợi sợ hãi, ghê tởm. Nhịp chậm rãi đáng sợ."
    term_categories: ["sinh vật", "nghi lễ", "địa điểm", "hiện tượng siêu nhiên"]

  xianxia:
    label: "Tiên hiệp / Huyền huyễn"
    hint: "Giữ nguyên thuật ngữ tu luyện, cảnh giới, công pháp. Văn phong cao ngạo, bay bổng."
    term_categories: ["cảnh giới", "công pháp", "linh khí", "môn phái", "bảo vật"]

  wuxia:
    label: "Võ hiệp"
    hint: "Thuật ngữ võ thuật, giang hồ. Văn phong trượng nghĩa, hào sảng."
    term_categories: ["võ công", "môn phái", "binh khí", "giang hồ"]

  isekai:
    label: "Isekai / Chuyển sinh"
    hint: "Hệ thống game, chỉ số, kỹ năng. Giữ tinh thần nhẹ nhàng hoặc nghiêm túc theo ngữ cảnh."
    term_categories: ["kỹ năng", "cấp độ", "chỉ số", "hệ thống", "lớp nhân vật"]

  xuanhuan:
    label: "Huyền huyễn"
    hint: "Kết hợp tu luyện cổ điển và yếu tố kỳ ảo phương Tây. Phong thái hào hùng, bá đạo, thuật ngữ võ học/phép thuật đan xen."
    term_categories: ["công pháp", "huyết thống", "linh thú", "vũ khí", "bí cảnh"]

  urban:
    label: "Đô thị / Hiện đại"
    hint: "Bối cảnh hiện đại. Xưng hô tự nhiên, đời thường, ngôn ngữ gần gũi. Tránh từ Hán-Việt quá cổ trang."
    term_categories: ["chức danh", "địa danh hiện đại", "biệt danh", "tiếng lóng"]

  system:
    label: "Hệ thống / Võng du"
    hint: "Giao diện trò chơi, bảng chỉ số, nhiệm vụ, phần thưởng. Dịch thuật ngữ game chuẩn xác và mượt mà."
    term_categories: ["nhiệm vụ", "chỉ số", "vật phẩm", "danh hiệu"]

  romcom:
    label: "Romcom / Học đường"
    hint: "Hài hước lãng mạn, thanh xuân học đường. Văn phong nhẹ nhàng, tươi trẻ, hội thoại tự nhiên, tinh nghịch."
    term_categories: ["học đường", "biệt danh", "tình cảm", "tiếng lóng học sinh"]

  apocalypse:
    label: "Mạt thế / Sinh tồn"
    hint: "Thế giới tận thế, zombie, biến dị. Không khí u ám, kịch tính, khốc liệt. Kỹ năng sinh tồn."
    term_categories: ["biến dị", "zombie", "căn cứ", "kỹ năng sinh tồn"]

  mystery:
    label: "Trinh thám / Bí ẩn"
    hint: "Nhịp điệu chậm rãi, kịch tính, suy luận logic. Chú trọng mô tả chi tiết, hiện trường, tạo cảm giác tò mò."
    term_categories: ["manh mối", "hiện trường", "tội phạm", "thuật ngữ pháp y"]

# Target language configs
languages:
  vi:
    name: "Tiếng Việt"
    instruction: "Dịch sang tiếng Việt. Xưng hô tự nhiên theo văn hóa Việt."
  zh:
    name: "中文 (简体)"
    instruction: "翻译成简体中文。保持自然流畅的表达。"
  en:
    name: "English"
    instruction: "Translate to natural English. Match the author's register and tone."
  ja:
    name: "日本語"
    instruction: "日本語に翻訳する。自然で流暢な文体を保つ。"
  ko:
    name: "한국어"
    instruction: "한국어로 번역하세요. 자연스러운 문체를 유지하세요."
  id:
    name: "Bahasa Indonesia"
    instruction: "Terjemahkan ke Bahasa Indonesia yang natural dan mengalir."
